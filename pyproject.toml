[tool.black]
line-length = 120
verbose = 1
color = true
exclude = '''
(
  /(
      \.eggs
    | \.git
    | \.mypy_cache
    | \.pytest_cache
    | \.venv
  )/
)
'''

[tool.isort]
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 120
src_paths = ["soxyproxy", "test"]
skip = [".mypy_cache", ".pytest_cache", "venv"]

[tool.pylint.messages_control]
disable = "missing-docstring,logging-fstring-interpolation,too-few-public-methods,too-many-arguments,duplicate-code"
extend-ignore = "E203,W503"

[tool.pylint.format]
max-line-length = "120"
indent-string = "    "
good-names = "i, x, y, T"

[tool.pylint.master]
ignore = "venv,tests"
indent-string = "    "
extension-pkg-whitelist = "pydantic"

[tool.poetry]
name = "soxyproxy"
version = "0.6.2"
description = "Pure Python SOCKS proxy server implementation"
authors = ["Aleksandr Shpak <shpaker@gmail.com>"]
readme = "readme.md"
homepage = "https://github.com/shpaker/soxyproxy"
repository = "https://github.com/shpaker/soxyproxy"

[tool.poetry.dependencies]
python = "^3.11"
pydantic = "^1.8.2"
passlib = "^1.7.4"
PyYAML = "^5.4.1"
click = "^8.1.3"

[tool.poetry.group.dev.dependencies]
isort = "^5.10.1"
black = "^22.10.0"
flake8 = "^6.0.0"
httpx = "^0.23.1"
httpx-socks = "^0.7.5"
mypy = "^0.991"
pre-commit = "^2.20.0"
pylint = "^2.15.7"
pytest = "^7.2.0"
types-pyyaml = "^6.0.12.2"
pytest-asyncio = "^0.20.2"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
